<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1 data-i18n="app.title">My App</h1>
      <button id="langBtn" class="lang-btn">SV</button>
    </header>

    <main>
      <div class="container">
        <h1 data-i18n="app.heading">My Todos</h1>
        <div class="input-section">
          <input
            type="text"
            id="todoInput"
            data-i18n-placeholder="input.placeholder"
            placeholder="Add a new todo..."
          />
          <button id="addBtn" data-i18n="button.add">Add</button>
        </div>

        <div class="filters">
          <button
            class="filter-btn active"
            data-filter="all"
            data-i18n="filter.all"
          >
            All
          </button>
          <button
            class="filter-btn"
            data-filter="active"
            data-i18n="filter.active"
          >
            Active
          </button>
          <button
            class="filter-btn"
            data-filter="completed"
            data-i18n="filter.completed"
          >
            Completed
          </button>
        </div>

        <ul class="todoList" id="todoList"></ul>
      </div>
    </main>

    <footer>
      <p>&copy; 2026</p>
    </footer>

    <script type="module" src="/main.js"></script>
  </body>
</html>
